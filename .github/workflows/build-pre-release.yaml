name: Build Pre-Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  BuildPreRelease:
    runs-on: ubuntu-latest
    environment: Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - git_ref: main
            asset_suffix: meta-core
          - git_ref: ninjia-core
            asset_suffix: ninjia-core
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.git_ref }}

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Signing properties
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -eu
          test -n "$SIGNING_KEYSTORE_BASE64" || { echo "::error::Missing secret SIGNING_KEYSTORE_BASE64"; exit 1; }
          test -n "$SIGNING_STORE_PASSWORD" || { echo "::error::Missing secret SIGNING_STORE_PASSWORD"; exit 1; }
          test -n "$SIGNING_KEY_ALIAS" || { echo "::error::Missing secret SIGNING_KEY_ALIAS"; exit 1; }
          test -n "$SIGNING_KEY_PASSWORD" || { echo "::error::Missing secret SIGNING_KEY_PASSWORD"; exit 1; }

          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH" || { echo "::error::Decoded keystore is empty"; exit 1; }

          {
            echo "keystore.path=$KEYSTORE_PATH"
            echo "keystore.password=$SIGNING_STORE_PASSWORD"
            echo "key.alias=$SIGNING_KEY_ALIAS"
            echo "key.password=$SIGNING_KEY_PASSWORD"
          } > signing.properties

          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$SIGNING_STORE_PASSWORD" \
            -alias "$SIGNING_KEY_ALIAS" \
            >/dev/null

      - name: Pre-release Build
        run: ./gradlew --no-daemon app:assembleAlphaRelease

      - name: Collect branch artifacts
        run: |
          mkdir -p dist
          shopt -s nullglob
          for file in app/build/outputs/apk/alpha/release/*.apk
          do
            filename=$(basename "$file")
            cp "$file" "dist/${filename%.apk}-${{ matrix.asset_suffix }}.apk"
          done

      - name: Upload branch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-${{ matrix.asset_suffix }}
          path: dist/*.apk
          if-no-files-found: error

  PublishPreRelease:
    needs: BuildPreRelease
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Download branch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prerelease-*
          merge-multiple: true
          path: dist

      - uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: Prerelease-alpha
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true

      - name: Upload Alpha
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Prerelease-alpha
          target_commitish: main
          files: dist/*.apk
          prerelease: true
          generate_release_notes: true
          overwrite_files: true

      - name: Release Changelog Builder
        uses: mikepenz/release-changelog-builder-action@v4
