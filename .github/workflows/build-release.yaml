name: Build Release

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release Tag (v2.x.x)'
        required: true

permissions:
  contents: write

jobs:
  PrepareRelease:
    runs-on: ubuntu-latest
    environment: Release
    outputs:
      version_name: ${{ steps.process-version.outputs.version_name }}
      version_code: ${{ steps.process-version.outputs.version_code }}
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Convert and set version env
        id: process-version
        run: |
          VERSION_TAG=${{ inputs.release-tag }}
          VERSION_TAG=${VERSION_TAG#v}
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_TAG"
          VERSION_CODE=$(printf "%1d%02d%03d" "${VERSION_PARTS[0]}" "${VERSION_PARTS[1]}" "${VERSION_PARTS[2]}")

          echo "version_name=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Re-write version
        uses: Devofure/advance-android-version-actions@v1.5
        with:
          gradlePath: build.gradle.kts
          versionCode: ${{ steps.process-version.outputs.version_code }}
          versionName: ${{ steps.process-version.outputs.version_name }}

      - name: Commit and push if changes
        run: |
          if git diff --quiet -- build.gradle.kts
          then
            exit 0
          fi

          newVersionName=${{ steps.process-version.outputs.version_name }}
          newVersionCode=${{ steps.process-version.outputs.version_code }}
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add build.gradle.kts
          git commit -m "Bump version to $newVersionName ($newVersionCode)"
          git push origin HEAD:main

  BuildRelease:
    needs: PrepareRelease
    runs-on: ubuntu-latest
    environment: Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - git_ref: main
            asset_suffix: meta-core
          - git_ref: ninjia-core
            asset_suffix: ninjia-core
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ matrix.git_ref }}

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Re-write version
        uses: Devofure/advance-android-version-actions@v1.5
        with:
          gradlePath: build.gradle.kts
          versionCode: ${{ needs.PrepareRelease.outputs.version_code }}
          versionName: ${{ needs.PrepareRelease.outputs.version_name }}

      - name: Signing properties
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -eu
          test -n "$SIGNING_KEYSTORE_BASE64" || { echo "::error::Missing secret SIGNING_KEYSTORE_BASE64"; exit 1; }
          test -n "$SIGNING_STORE_PASSWORD" || { echo "::error::Missing secret SIGNING_STORE_PASSWORD"; exit 1; }
          test -n "$SIGNING_KEY_ALIAS" || { echo "::error::Missing secret SIGNING_KEY_ALIAS"; exit 1; }
          test -n "$SIGNING_KEY_PASSWORD" || { echo "::error::Missing secret SIGNING_KEY_PASSWORD"; exit 1; }

          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH" || { echo "::error::Decoded keystore is empty"; exit 1; }

          {
            echo "keystore.path=$KEYSTORE_PATH"
            echo "keystore.password=$SIGNING_STORE_PASSWORD"
            echo "key.alias=$SIGNING_KEY_ALIAS"
            echo "key.password=$SIGNING_KEY_PASSWORD"
          } > signing.properties

          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$SIGNING_STORE_PASSWORD" \
            -alias "$SIGNING_KEY_ALIAS" \
            >/dev/null

      - name: Release Build
        run: ./gradlew --no-daemon app:assembleAlphaRelease

      - name: Collect branch artifacts
        run: |
          mkdir -p dist
          shopt -s nullglob
          for file in app/build/outputs/apk/alpha/release/*.apk
          do
            filename=$(basename "$file")
            cp "$file" "dist/${filename%.apk}-${{ matrix.asset_suffix }}.apk"
          done

      - name: Upload branch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: dist/*.apk
          if-no-files-found: error

  PublishRelease:
    needs:
      - PrepareRelease
      - BuildRelease
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Download branch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release-tag }}
          target_commitish: main
          files: dist/*.apk
          generate_release_notes: true
          overwrite_files: true

      - name: Release Changelog Builder
        uses: mikepenz/release-changelog-builder-action@v4.1.1
        with:
          configurationJson: |
            {
              "ignore_labels": [
                "Update"
              ],
            }
